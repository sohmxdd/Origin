name: Origin PR Comment Workflow

on:
  issue_comment:
    types: [created]

jobs:
  comment_action:
    name: Process Origin Comment Command
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: write

    steps:
      - name: Process Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENTER: ${{ github.event.comment.user.login }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ github.event.issue.pull_request.url }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: python
        run: |
          import json
          import os
          import re
          import subprocess
          import urllib.request
          import urllib.error

          comment_body = os.environ.get("COMMENT_BODY", "").strip()
          commenter = os.environ.get("COMMENTER")
          repo = os.environ.get("REPO")
          issue_number = os.environ.get("ISSUE_NUMBER")
          pr_url = os.environ.get("PR_URL")
          token = os.environ.get("GITHUB_TOKEN")
          default_branch = os.environ.get("DEFAULT_BRANCH", "main")

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github+json"
          }

          def post_comment(msg: str):
              """Helper to post a comment back to the PR."""
              url = f"https://api.github.com/repos/{repo}/issues/{issue_number}/comments"
              data = json.dumps({"body": msg}).encode("utf-8")
              req = urllib.request.Request(url, data=data, headers=headers, method="POST")
              try:
                  with urllib.request.urlopen(req) as resp:
                      print("Posted response comment.")
              except Exception as e:
                  print(f"Failed to post comment: {e}")

          # 1. Cheap Regex Check
          match = re.match(r'^/origin\s+(accept|reject)\s+(dec_[A-Za-z0-9]+)$', comment_body)
          if not match:
              print("Comment does not match the /origin accept|reject command. Exiting silently.")
              exit(0)

          action = match.group(1)
          decision_id = match.group(2)
          print(f"Detected command: {action} {decision_id}")

          # 2. Permission Check (Collaborator write access verification)
          perm_url = f"https://api.github.com/repos/{repo}/collaborators/{commenter}/permission"
          req = urllib.request.Request(perm_url, headers=headers)
          try:
              with urllib.request.urlopen(req) as resp:
                  perm_data = json.loads(resp.read().decode("utf-8"))
                  permission = perm_data.get("permission")
                  if permission not in ["write", "admin"]:
                      print(f"Commenter {commenter} has insufficient permission: {permission}. Exiting silently.")
                      exit(0)
          except Exception as e:
              print(f"Permission check API call failed: {e}. Exiting silently.")
              exit(0)

          print(f"Commenter {commenter} is authorized (permission: {permission}).")

          # 3. Retrieve PR details to check head ref and fork status
          req = urllib.request.Request(pr_url, headers=headers)
          try:
              with urllib.request.urlopen(req) as resp:
                  pr_data = json.loads(resp.read().decode("utf-8"))
                  head_repo_fullname = pr_data["head"]["repo"]["full_name"]
                  head_ref = pr_data["head"]["ref"]
                  head_clone_url = pr_data["head"]["repo"]["clone_url"]
          except Exception as e:
              print(f"Failed to retrieve PR details: {e}")
              post_comment(f"❌ Origin workflow error: Failed to retrieve PR branch details.")
              exit(1)

          # Scope limit: Check if the PR is from a fork
          if head_repo_fullname != repo:
              print(f"PR is from external fork: {head_repo_fullname}. Exiting cleanly with notice.")
              post_comment(
                  "⚠️ Origin action rejected: The `/origin` PR comment workflow is currently scoped to internal branch pull requests only. "
                  "Automated commits cannot be pushed back to external contributor forks due to GitHub permission restrictions."
              )
              exit(0)

          # 4. Checkout trusted default branch code (main)
          print(f"Checking out default branch ({default_branch}) for trusted installation...")
          subprocess.run(["git", "clone", "--depth", "1", "-b", default_branch, f"https://github.com/{repo}.git", "trusted-origin"], check=True)

          # 5. Checkout PR head branch for data manipulation
          print(f"Checking out PR branch ({head_ref}) for data workspace...")
          # Clone the full branch to allow pushing
          push_url = f"https://x-access-token:{token}@github.com/{repo}.git"
          subprocess.run(["git", "clone", "-b", head_ref, push_url, "pr-data"], check=True)

          # 6. Install Origin CLI from trusted-origin
          print("Installing Origin package from trusted source...")
          # Install using pip in editable or normal mode from the trusted folder
          subprocess.run(["pip", "install", "./trusted-origin"], check=True)

          # 7. Execute decision accept/reject command with cwd set to pr-data
          print(f"Running origin command: decision {action} {decision_id}...")
          try:
              cmd = ["origin", "decision", action, decision_id]
              res = subprocess.run(cmd, cwd="pr-data", capture_output=True, text=True)
              
              if res.returncode != 0:
                  error_msg = res.stderr.strip() or res.stdout.strip() or "Unknown error"
                  print(f"Origin command failed: {error_msg}")
                  post_comment(f"❌ Origin action failed for `{decision_id}`:\n> {error_msg}")
                  exit(0) # Exit code 0 as we posted a human-readable comment error
                  
              print(f"Origin command output: {res.stdout.strip()}")
          except Exception as e:
              print(f"Failed to execute origin CLI: {e}")
              post_comment(f"❌ Origin workflow error: Failed to run trusted CLI command.")
              exit(1)

          # 8. Commit and push modifications in pr-data
          print("Staging and pushing changes to PR branch...")
          try:
              subprocess.run(["git", "config", "user.name", "github-actions[bot]"], cwd="pr-data", check=True)
              subprocess.run(["git", "config", "user.email", "41898282+github-actions[bot]@users.noreply.github.com"], cwd="pr-data", check=True)
              subprocess.run(["git", "add", ".origin/"], cwd="pr-data", check=True)
              
              # Check if anything changed
              diff_res = subprocess.run(["git", "diff", "--cached", "--quiet"], cwd="pr-data")
              if diff_res.returncode == 0:
                  print("No changes to commit (decision might already be in this state).")
                  post_comment(f"ℹ️ Origin: Decision `{decision_id}` is already in the requested state.")
                  exit(0)
                  
              subprocess.run(["git", "commit", "-m", f"origin: {action} decision {decision_id} via PR comment"], cwd="pr-data", check=True)
              subprocess.run(["git", "push", "origin", f"HEAD:{head_ref}"], cwd="pr-data", check=True)
              print("Pushed commit back to branch.")
          except Exception as e:
              print(f"Git commit/push failed: {e}")
              post_comment(f"❌ Origin workflow error: Failed to commit or push changes back to PR branch.")
              exit(1)

          # 9. Post success comment
          post_comment(f"✅ Successfully {action}ed decision `{decision_id}` in workspace! The mirror files have been updated and pushed back to the PR branch.")
